<!DOCTYPE html>
<html>
<head>
<title>SEO Task Manager</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #444;
padding:10px;
}

button{
padding:5px 10px;
}

</style>
</head>

<body>

<h2>SEO Task Manager</h2>

<p>
Total: <span id="total">0</span> |
Done: <span id="done">0</span> |
Pending: <span id="pending">0</span>
</p>

<table>

<thead>

<tr>
<th>Done</th>
<th>Task</th>
<th>Category</th>
<th>Priority</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="tasks"></tbody>

</table>

<script>

let defaultTasks=[

{id:1,title:"Write Homepage Title Tag",cat:"Onpage",priority:"High"},
{id:2,title:"Write Homepage Meta Description",cat:"Onpage",priority:"High"},
{id:3,title:"Create XML Sitemap",cat:"Technical",priority:"High"},
{id:4,title:"Fix Broken Links",cat:"Technical",priority:"High"},
{id:5,title:"Publish Blog Article",cat:"Content",priority:"Medium"}

]

let saved=JSON.parse(localStorage.getItem("tasks"))

let tasks=saved && saved.length ? saved : defaultTasks

function save(){

localStorage.setItem("tasks",JSON.stringify(tasks))

}

function toggle(id){

let t=tasks.find(x=>x.id==id)

t.done=!t.done

save()

render()

}

function remove(id){

tasks=tasks.filter(x=>x.id!=id)

save()

render()

}

function render(){

let tbody=document.getElementById("tasks")

tbody.innerHTML=""

let done=0

tasks.forEach(t=>{

if(t.done) done++

tbody.innerHTML+=`

<tr>

<td>
<input type="checkbox"
${t.done?"checked":""}
onchange="toggle(${t.id})">
</td>

<td>${t.title}</td>
<td>${t.cat}</td>
<td>${t.priority}</td>

<td>
<button onclick="remove(${t.id})">Delete</button>
</td>

</tr>

`

})

document.getElementById("total").innerText=tasks.length
document.getElementById("done").innerText=done
document.getElementById("pending").innerText=tasks.length-done

}

render()

</script>

</body>
</html>
